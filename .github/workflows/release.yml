name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/naste-server_${GOOS}_${GOARCH} .
          go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/naste_${GOOS}_${GOARCH} ./cmd/naste
          cd dist && tar czf naste-server_${GOOS}_${GOARCH}.tar.gz naste-server_${GOOS}_${GOARCH} && tar czf naste_${GOOS}_${GOARCH}.tar.gz naste_${GOOS}_${GOARCH}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: naste-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME:-v0.0.0}
          gh release create "${VERSION}" --title "${VERSION}" --generate-notes dist/*.tar.gz
